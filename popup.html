<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Яндекс.Нейродетектор для Author.Today </title>
  <style>
    body {
      min-width: 220px;
      padding: 16px;
      font-family: sans-serif;
      font-size: 14px;
      color: #222;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 12px;
      color: #555;
    }
    button {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      transition: background 0.2s;
    }
    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }
    button:not(:disabled):hover {
      background: #1558b0;
    }
    #neuro-btn {
      margin-top: 8px;
      background: #2a7d4f;
    }
    #neuro-btn:not(:disabled):hover {
      background: #1e5c39;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #555;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <button id="copy-btn" disabled>Скопировать главу</button>
  <button id="neuro-btn" disabled>Проверить в нейродетекторе Яндекс</button>
  <div id="status">Проверка страницы…</div>
  <script src="popup.js"></script>
</body>
</html>
